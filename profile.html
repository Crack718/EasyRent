<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="css/style.css" />

<body data-page="profile">
  <header class="topbar">
    <div class="brand">EasyRent</div>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="profile.html">Профиль</a>
      <a href="cart.html">Бронирования</a>
      <a id="admin-link" href="admin.html" class="hidden">Админ</a>
    </nav>
    <div class="auth">
      <button id="open-auth" class="btn btn-outline">Войти</button>
      <div id="user-menu" class="hidden">
        <span id="user-email" class="muted"></span>
        <button id="logout-btn" class="btn btn-outline">Выйти</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Профиль</h2>
      <form id="profile-form" class="form stack">
        <input class="input" name="name" type="text" placeholder="Полное имя" required />
        <input class="input" name="phone" type="tel" placeholder="Телефон" />
        <button class="btn btn-primary" type="submit">Сохранить профиль</button>
      </form>
    </section>

    <section class="panel">
      <h2>Избранное</h2>
      <div id="favorites-list" class="grid"></div>
    </section>

    <section class="panel">
      <h2>История бронирований</h2>
      <div id="booking-history" class="stack"></div>
    </section>

    <section class="panel">
      <h2>Мои отзывы</h2>
      <div id="my-reviews" class="stack"></div>
    </section>

    <section class="panel">
      <h2>Мои сообщения</h2>
      <div id="my-messages" class="stack"></div>
    </section>
  </main>

  <div id="auth-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-auth" class="close-btn">x</button>
      <div class="tabs">
        <button data-tab="login" class="tab active">Вход</button>
        <button data-tab="register" class="tab">Регистрация</button>
        <button data-tab="reset" class="tab">Восстановление</button>
      </div>
      <form id="login-form" class="form stack" data-panel="login">
        <input class="input" name="email" type="email" placeholder="Эл. почта" required />
        <input class="input" name="password" type="password" placeholder="Пароль" required />
        <button class="btn btn-primary" type="submit">Войти</button>
      </form>
      <form id="register-form" class="form stack hidden" data-panel="register">
        <input class="input" name="name" type="text" placeholder="Полное имя" required />
        <input class="input" name="email" type="email" placeholder="Эл. почта" required />
        <input class="input" name="phone" type="tel" placeholder="Телефон" />
        <input class="input" name="password" type="password" placeholder="Пароль" required />
        <button class="btn btn-primary" type="submit">Создать аккаунт</button>
      </form>
      <form id="reset-form" class="form stack hidden" data-panel="reset">
        <input class="input" name="email" type="email" placeholder="Эл. почта" required />
        <button class="btn btn-primary" type="submit">Отправить ссылку</button>
      </form>
      <p id="auth-message" class="muted"></p>
    </div>
  </div>

  <footer class="footer">EasyRent — демо на Firebase</footer>
  <script type="module" src="js/pages/profile.js"></script>
</body>
</html>
